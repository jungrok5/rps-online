<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>가위바위보 서바이벌 · 온라인 가위바위보</title>
  <meta name="description" content="링크를 카톡·팀즈로 공유하면 여러 명이 한 명 남을 때까지 대결하는 무료 온라인 가위바위보. 3D 캐릭터 연출, 데이터베이스 없이 동작합니다." />
  <meta name="theme-color" content="#6c7bff" />
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="/icon-512.png" />
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="가위바위보 서바이벌" />
  <meta property="og:title" content="가위바위보 서바이벌" />
  <meta property="og:description" content="여러 명이 한 명 남을 때까지 대결하는 무료 온라인 가위바위보. 링크 공유 · 3D 연출 · DB 없음." />
  <meta property="og:image" content="/og.png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta property="og:locale" content="ko_KR" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="가위바위보 서바이벌" />
  <meta name="twitter:description" content="여러 명이 한 명 남을 때까지 대결하는 무료 온라인 가위바위보. 링크 공유 · 3D 연출 · DB 없음." />
  <meta name="twitter:image" content="/og.png" />
  <link rel="stylesheet" href="/style.css" />
  <script type="importmap">
    { "imports": { "three": "/vendor/three.module.js" } }
  </script>
</head>
<body>
  <div id="stage"></div>
  <div class="wrap">
    <h1 id="title">가위바위보 서바이벌</h1>
    <p class="sub" id="subtitle"></p>
    <div id="app"></div>
    <div class="err" id="err"></div>
    <p class="sub center mt"><a href="/">새 방 만들기</a></p>
  </div>
  <div class="toast" id="toast"></div>

  <script>
    const roomId = location.pathname.split('/').pop();
    const KO = { rock: '바위', paper: '보', scissors: '가위' };
    const EMOJI = { rock: '✊', paper: '✋', scissors: '✌️' };
    const CHOICES = ['rock', 'paper', 'scissors'];

    // 방장 토큰: 생성 직후 URL 해시로 도착 → localStorage 저장 후 해시 제거
    const hostKey = `rps_host_${roomId}`;
    const playerKey = `rps_player_${roomId}`;
    if (location.hash.startsWith('#host=')) {
      localStorage.setItem(hostKey, location.hash.slice(6));
      history.replaceState(null, '', `/r/${roomId}`);
    }
    const hostToken = localStorage.getItem(hostKey);
    let me = JSON.parse(localStorage.getItem(playerKey) || 'null'); // {playerId, name}

    const app = document.getElementById('app');
    const errEl = document.getElementById('err');
    let lastSig = '';
    let lastSeenHistoryLen = null; // 이번 세션에서 새로 생긴 라운드 결과만 연출
    let revealing = false;         // 결과 공개 연출 중에는 하단 렌더 보류
    let latestState = null;
    let timerEndAt = null, timerTotalMs = 0;

    // 라운드 카운트다운 갱신 (DOM이 있을 때만)
    function tickTimer() {
      const el = document.getElementById('timer');
      if (!el || timerEndAt == null) return;
      const remain = Math.max(0, timerEndAt - Date.now());
      // 화면 표시는 설정한 제한시간으로 상한 처리 (다음 라운드에 더해지는 연출 여유시간 숨김)
      const shown = timerTotalMs ? Math.min(remain, timerTotalMs) : remain;
      const secs = Math.ceil(shown / 1000);
      el.innerHTML = secs + '<span class="unit">초</span>';
      const cls = secs <= 3 ? 'danger' : (secs <= 6 ? 'warn' : '');
      el.className = 'timer ' + cls;
      const bar = document.getElementById('timerbar');
      if (bar) {
        bar.className = 'timerbar ' + cls;
        const i = bar.querySelector('i');
        if (i) i.style.width = Math.max(0, Math.min(1, shown / (timerTotalMs || 1))) * 100 + '%';
      }
    }
    setInterval(tickTimer, 200);

    function showErr(msg) { errEl.textContent = msg || ''; }
    function toast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg; t.classList.add('show');
      clearTimeout(t._t); t._t = setTimeout(() => t.classList.remove('show'), 1800);
    }
    async function api(action, body) {
      const res = await fetch(`/api/rooms/${roomId}${action}`, {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body || {}),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || '요청 실패');
      return data;
    }

    // ---------------- 렌더링 ----------------
    function render(s) {
      document.getElementById('title').textContent = s.title;
      document.getElementById('subtitle').textContent = s.mode === 'last-loser'
        ? '💀 한 명이 질 때까지 — 마지막에 남는 사람이 벌칙 당첨!'
        : '🏆 한 명이 이길 때까지 — 최후의 1인이 우승!';
      const isHost = !!hostToken;
      timerEndAt = null; // playingView 에서 필요 시 다시 설정
      let html = '';

      if (s.status === 'lobby') {
        html += lobbyView(s, isHost);
      } else if (s.status === 'playing') {
        html += playingView(s);
      } else if (s.status === 'finished') {
        html += finishedView(s, isHost);
      }
      app.innerHTML = html;
      wire(s, isHost);
      window.RPS3D && window.RPS3D.sync(s, me && me.playerId); // 3D 캐릭터 동기화
    }

    function shareCard() {
      const link = location.origin + '/r/' + roomId;
      return `<div class="card">
        <label>친구에게 보낼 링크 (카톡·팀즈에 붙여넣기)</label>
        <div class="share">
          <input type="text" id="shareLink" readonly value="${link}" />
          <button id="copyBtn">복사</button>
        </div>
      </div>`;
    }

    function aliveLabel(s) { return s.mode === 'last-loser' ? '남음' : '생존'; }
    function deadLabel(s) { return s.mode === 'last-loser' ? '통과' : '탈락'; }

    function playerList(s) {
      return `<ul class="players">` + s.players.map(p => {
        const tag = s.status === 'lobby'
          ? '<span class="badge live">대기</span>'
          : (p.alive ? `<span class="badge live">${aliveLabel(s)}</span>` : `<span class="badge">${deadLabel(s)}</span>`);
        const meMark = (me && p.id === me.playerId) ? ' (나)' : '';
        return `<li class="${p.alive ? '' : 'dead'}"><span>${escapeHtml(p.name)}${meMark}</span>${tag}</li>`;
      }).join('') + `</ul>`;
    }

    function lobbyView(s, isHost) {
      let html = shareCard();
      html += `<div class="card"><p class="sub" style="margin:2px 0 8px">현재 ${s.players.length}명 참가</p>`;
      html += `<div class="only2d"><label>참가자</label>${playerList(s)}</div>`;
      if (!me) {
        html += `<div class="mt"><label for="nameInput">이름을 입력하고 참가하세요</label>
          <div class="row"><input type="text" id="nameInput" placeholder="이름" maxlength="20" />
          <button id="joinBtn">참가</button></div></div>`;
      } else {
        html += `<p class="status mt">참가 완료! 방장이 시작하기를 기다리는 중…</p>`;
      }
      if (isHost) {
        const ok = s.players.length >= 2;
        html += `<button class="block mt" id="startBtn" ${ok ? '' : 'disabled'}>게임 시작 ${ok ? '' : '(2명 이상 필요)'}</button>`;
      }
      html += `</div>`;
      return html;
    }

    function playingView(s) {
      const mine = s.players.find(p => me && p.id === me.playerId);
      const submittedMe = me && s.submitted.includes(me.playerId);
      const aliveWord = s.mode === 'last-loser' ? '남은' : '생존';
      let html = `<div class="card center">
        <div class="big"><span class="rno">ROUND ${s.round}</span> · ${aliveWord} ${s.aliveCount}명</div>`;
      if (s.roundSeconds > 0 && s.roundEndsIn != null) {
        timerEndAt = Date.now() + s.roundEndsIn;
        timerTotalMs = s.roundSeconds * 1000;
        html += `<div class="timer" id="timer">${s.roundSeconds}<span class="unit">초</span></div>
          <div class="timerbar" id="timerbar"><i style="width:100%"></i></div>`;
      }

      if (!me) {
        html += `<p class="status">이미 시작된 게임이에요. 관전 중입니다 👀</p>`;
      } else if (!mine) {
        html += `<p class="status">관전 중입니다 👀</p>`;
      } else if (!mine.alive) {
        html += s.mode === 'last-loser'
          ? `<p class="status">통과! 안전합니다 😎 결과를 지켜보세요…</p>`
          : `<p class="status">아쉽지만 탈락했어요 😢 관전 중…</p>`;
      } else if (submittedMe) {
        html += `<p class="status">선택 완료! 다른 사람을 기다리는 중… (${s.submitted.length}/${s.aliveCount})</p>`;
      } else {
        html += `<p class="status">무엇을 낼까요?</p><div class="choices">` +
          ['scissors','rock','paper'].map(c =>
            `<button class="choice" data-choice="${c}">${EMOJI[c]}<span class="ko">${KO[c]}</span></button>`
          ).join('') + `</div>` +
          `<button class="block mt secondary" id="randomBtn">🎲 랜덤으로 내기</button>`;
      }
      html += `</div>`;
      html += playerStatusCard(s);
      html += historyCard(s);
      return html;
    }

    function playerStatusCard(s) {
      return `<div class="card only2d"><label>대기 현황</label><ul class="players">` +
        s.players.map(p => {
          if (!p.alive) return `<li class="dead"><span>${escapeHtml(p.name)}</span><span class="badge">${deadLabel(s)}</span></li>`;
          const done = s.submitted.includes(p.id);
          const tag = done ? '<span class="badge done">제출완료</span>' : '<span class="badge live">선택중…</span>';
          return `<li><span>${escapeHtml(p.name)}</span>${tag}</li>`;
        }).join('') + `</ul></div>`;
    }

    function finishedView(s, isHost) {
      const loser = s.mode === 'last-loser';
      let html = `<div class="card center">
        <div class="trophy">${loser ? '💀' : '🏆'}</div>
        <div class="big">${loser ? '벌칙 당첨' : '우승'}</div>
        <div class="winner">${escapeHtml(s.winner || '?')}</div>`;
      if (isHost) html += `<button class="block mt" id="resetBtn">같은 멤버로 다시 하기</button>`;
      html += `</div>`;
      html += historyCard(s);
      return html;
    }

    function historyCard(s) {
      if (!s.history.length) return '';
      let html = `<div class="card"><label>라운드 기록</label><ul class="history">`;
      for (const h of s.history) {
        const picks = Object.entries(h.picks)
          .map(([n, c]) => `${escapeHtml(n)} ${EMOJI[c]}`).join(' · ');
        html += `<li><span class="rno">R${h.round}</span> ${picks}<span class="note">${escapeHtml(h.note)}</span></li>`;
      }
      html += `</ul></div>`;
      return html;
    }

    // ---------------- 이벤트 연결 ----------------
    function wire(s, isHost) {
      const copyBtn = document.getElementById('copyBtn');
      if (copyBtn) copyBtn.onclick = () => {
        const inp = document.getElementById('shareLink');
        const text = `${s.title}\n${inp.value}`; // 제목 + 링크 함께 복사
        const fallback = () => { inp.select(); document.execCommand('copy'); };
        if (navigator.clipboard) {
          navigator.clipboard.writeText(text).then(() => toast('제목과 링크 복사됨!')).catch(() => { fallback(); toast('복사됨!'); });
        } else { fallback(); toast('복사됨!'); }
      };

      const joinBtn = document.getElementById('joinBtn');
      if (joinBtn) joinBtn.onclick = async () => {
        showErr('');
        const name = document.getElementById('nameInput').value.trim();
        try {
          const d = await api('/join', { name });
          me = { playerId: d.playerId, name: d.name };
          localStorage.setItem(playerKey, JSON.stringify(me));
          lastSig = ''; poll();
        } catch (e) { showErr(e.message); }
      };

      const startBtn = document.getElementById('startBtn');
      if (startBtn) startBtn.onclick = async () => {
        showErr('');
        try { await api('/start', { hostToken }); lastSig = ''; poll(); }
        catch (e) { showErr(e.message); }
      };

      const resetBtn = document.getElementById('resetBtn');
      if (resetBtn) resetBtn.onclick = async () => {
        try { await api('/reset', { hostToken }); lastSig = ''; poll(); }
        catch (e) { showErr(e.message); }
      };

      async function submitChoice(choice, srcBtn) {
        document.querySelectorAll('.choice').forEach(b => b.disabled = true);
        const rb = document.getElementById('randomBtn');
        if (rb) rb.disabled = true;
        if (srcBtn) srcBtn.classList.add('selected');
        showErr('');
        try { await api('/play', { playerId: me.playerId, choice, round: s.round }); lastSig = ''; poll(); }
        catch (e) {
          showErr(e.message);
          document.querySelectorAll('.choice').forEach(b => b.disabled = false);
          if (rb) rb.disabled = false;
        }
      }

      document.querySelectorAll('.choice').forEach(btn => {
        btn.onclick = () => submitChoice(btn.dataset.choice, btn);
      });

      const randomBtn = document.getElementById('randomBtn');
      if (randomBtn) randomBtn.onclick = () => {
        const pick = ['rock', 'paper', 'scissors'][Math.floor(Math.random() * 3)];
        const target = document.querySelector(`.choice[data-choice="${pick}"]`);
        randomBtn.textContent = `🎲 ${KO[pick]} ${EMOJI[pick]} 선택!`;
        submitChoice(pick, target);
      };
    }

    function escapeHtml(str) {
      return String(str).replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
    }

    // ---------------- 결과 공개 연출 (룰렛 서서히 + 내 결과 마지막) ----------------
    const HOLD_MS = 1900; // 최종 확정 후 머무는 시간
    function randEmoji() { return EMOJI[CHOICES[Math.floor(Math.random() * 3)]]; }

    function outcome(name, entry, mode) {
      if (!entry.eliminated.length) return { cls: 'draw', txt: '무승부' };
      const elim = entry.eliminated.includes(name);
      if (mode === 'last-loser') {
        return elim ? { cls: 'good', txt: '통과 😎' } : { cls: 'bad', txt: '잔류 😱' };
      }
      return elim ? { cls: 'bad', txt: '탈락 💥' } : { cls: 'good', txt: '생존 ✅' };
    }

    // 내 시점의 최종 한 줄 (마지막에 가장 크게 보여줄 문구). final = 이 라운드가 게임의 최종 라운드인가
    function personalVerdict(entry, s, final) {
      const mine = me && entry.picks[me.name] !== undefined;
      if (!mine) {
        return final
          ? (s.mode === 'last-loser' ? '💀 벌칙 당첨: ' : '🏆 우승: ') + s.winner
          : entry.note;
      }
      if (!entry.eliminated.length) return '🤝 무승부 — 재대결!';
      if (final && s.winner === me.name) {
        return s.mode === 'last-loser' ? '💀 내가 벌칙 당첨…' : '🏆 내가 우승!!';
      }
      const o = outcome(me.name, entry, s.mode);
      return { '생존 ✅': '😮‍💨 생존 성공!', '탈락 💥': '😭 탈락…',
               '통과 😎': '😎 통과! 안전!', '잔류 😱': '😱 아직 안 끝났다…' }[o.txt] || o.txt;
    }

    function playReveal(entry, s, final) {
      revealing = true;
      document.body.classList.add('revealing'); // 3D일 때 연출 동안 HUD 숨김
      let done = false;
      // 정리(정상/실패 공통): 오버레이 제거 → 렌더 → 다음 미공개 라운드를 즉시 이어서 폴링
      const cleanup = () => {
        if (done) return; done = true;
        clearTimeout(failsafe);
        document.querySelectorAll('.reveal, .flashbang').forEach((el) => el.remove());
        try { window.RPS3D && window.RPS3D.endReveal(); } catch (e) {}
        document.body.classList.remove('revealing');
        revealing = false; lastSig = '';
        if (latestState) render(latestState);
        poll(); // 밀린 라운드가 있으면 바로 다음 연출로 연결
      };
      // 안전장치: 어떤 이유로든 연출이 끝나지 않아도 최대 12초 후 강제 종료
      const failsafe = setTimeout(cleanup, 12000);

      // === 3D 무대가 켜져 있으면 캐릭터로 연출 (실패 시 아래 2D로 폴백) ===
      if (window.RPS3D && window.RPS3D.ready) {
        try {
          const outcomes = {};
          for (const n of Object.keys(entry.picks)) outcomes[n] = outcome(n, entry, s.mode).cls;
          const payload = {
            picks: entry.picks,
            outcomes,
            verdict: personalVerdict(entry, s, final),
            note: entry.note + (entry.auto && entry.auto.length ? `  ⏰ ${entry.auto.join(', ')} 시간초과` : ''),
            final,
          };
          window.RPS3D.reveal(payload, cleanup);
          return;
        } catch (e) { /* 3D 실패 → 2D 연출로 진행 */ }
      }

      const all = Object.keys(entry.picks);
      const myName = (me && entry.picks[me.name] !== undefined) ? me.name : null;
      const others = all.filter((n) => n !== myName);
      const ordered = (myName ? [myName] : []).concat(others); // 내 슬롯을 맨 앞 기준점으로

      const overlay = document.createElement('div');
      overlay.className = 'reveal suspense';
      overlay.innerHTML =
        `<div class="drum">🥁 두구두구두구… ROUND ${entry.round}</div>
         <div class="slots">` +
        ordered.map((n) => `<div class="slot ${n === myName ? 'mine' : 'spin'}" data-name="${encodeURIComponent(n)}">
            <span class="emo">${n === myName ? EMOJI[entry.picks[n]] : '✊'}</span>
            <div class="pname">${escapeHtml(n)}${n === myName ? ' (나)' : ''}</div>
            <div class="res"></div>
          </div>`).join('') +
        `</div>
         <div class="myverdict" id="myverdict"></div>
         <div class="verdict" id="verdict"></div>`;
      document.body.appendChild(overlay);

      const slotEls = {};
      overlay.querySelectorAll('.slot').forEach((el) => { slotEls[decodeURIComponent(el.dataset.name)] = el; });
      if (myName) slotEls[myName].classList.add('locked'); // 내 선택은 바로 확정(기준점)

      // 모든 선택이 멈춘 뒤 → 정적 → '결과 확정'을 마지막에 공개
      const finish = () => {
        if (done) return; // 안전장치가 이미 정리했으면 무시 (유령 플래시 방지)
        setTimeout(() => {
          if (done) return;
          const flash = document.createElement('div');
          flash.className = 'flashbang';
          document.body.appendChild(flash);
          setTimeout(() => flash.remove(), 500);
          if (navigator.vibrate) navigator.vibrate([40, 40, 90]);
          overlay.classList.remove('suspense');
          for (const n of all) {
            const o = outcome(n, entry, s.mode);
            slotEls[n].classList.add(o.cls);
            slotEls[n].querySelector('.res').textContent = o.txt;
          }
          const mv = overlay.querySelector('#myverdict');
          mv.textContent = personalVerdict(entry, s, final);
          requestAnimationFrame(() => mv.classList.add('show'));
          overlay.querySelector('#verdict').textContent =
            entry.note + (entry.auto && entry.auto.length ? `  ⏰ ${entry.auto.join(', ')} 시간초과` : '');
          setTimeout(cleanup, HOLD_MS);
        }, 650); // 공개 직후의 '정적'
      };

      if (others.length === 0) { finish(); return; }

      // 상대 슬롯: 룰렛처럼 빠르게 돌다가 점점 느려지며 하나씩 멈춤
      let remaining = others.length;
      others.forEach((n, i) => {
        const duration = 1300 + Math.min(i, 4) * 320; // 뒤 사람일수록 조금 더 늦게 멈춤
        const el = slotEls[n];
        const emo = el.querySelector('.emo');
        const start = performance.now();
        const step = () => {
          const t = (performance.now() - start) / duration;
          if (t >= 1) {
            emo.textContent = EMOJI[entry.picks[n]];
            el.classList.remove('spin');
            el.classList.add('locked');
            if (--remaining === 0) finish();
            return;
          }
          emo.textContent = randEmoji();
          setTimeout(step, 55 + 240 * t); // t가 커질수록 간격이 벌어짐 = 서서히 멈춤
        };
        step();
      });
    }

    // ---------------- 폴링 ----------------
    async function poll() {
      try {
        const res = await fetch(`/api/rooms/${roomId}`);
        if (!res.ok) { const d = await res.json(); showErr(d.error); return; }
        const s = await res.json();
        latestState = s;

        // 새 라운드 결과가 생겼으면 한 라운드씩 순서대로 연출 (기록이 줄면 = 새 게임 → 재동기화)
        if (lastSeenHistoryLen === null || s.history.length < lastSeenHistoryLen) {
          lastSeenHistoryLen = s.history.length;
        } else if (!revealing && s.history.length > lastSeenHistoryLen) {
          const idx = lastSeenHistoryLen;            // 아직 안 본 가장 오래된 라운드
          const entry = s.history[idx];
          lastSeenHistoryLen = idx + 1;              // 연출 중에는 더 건너뛰지 않음 → 누락 방지
          const final = (idx === s.history.length - 1) && s.status === 'finished';
          playReveal(entry, s, final);
          return;
        }
        if (revealing) return; // 연출 중에는 하단 렌더 보류

        // 상태 서명: 바뀐 경우에만 다시 그림 (입력 포커스 유지)
        const sig = JSON.stringify([s.status, s.round, s.players.map(p=>[p.name,p.alive]), s.submitted.length, s.history.length, s.winner, !!me]);
        if (sig !== lastSig) { lastSig = sig; render(s); }
      } catch (e) { /* 네트워크 일시 오류 무시 */ }
    }

    // 3D 무대가 준비되면 호출 (최신 상태로 캐릭터 동기화)
    window.rpsResync = () => { if (latestState) window.RPS3D?.sync(latestState, me && me.playerId); };

    poll();
    setInterval(poll, 1500);
  </script>

  <!-- 3D 무대 부트스트랩 (실패하면 window.RPS3D 미설정 → 자동 2D 폴백) -->
  <script type="module">
    import { init, sync, reveal, endReveal, charCount } from '/scene.js';
    try {
      if (init(document.getElementById('stage'))) {
        window.RPS3D = { ready: true, sync, reveal, endReveal, charCount };
        document.body.classList.add('has3d');
        window.rpsResync && window.rpsResync();
      }
    } catch (e) { console.warn('3D 비활성화 → 2D 폴백', e); }
  </script>
</body>
