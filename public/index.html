<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>가위바위보 서바이벌</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <div class="wrap">
    <h1>✊✋✌️ 가위바위보 서바이벌</h1>
    <p class="sub">방을 만들고 링크를 카톡·팀즈로 공유하세요. 한 명이 남을 때까지 대결합니다!</p>

    <div class="card">
      <label for="title">게임 제목 (선택)</label>
      <input id="title" type="text" placeholder="예: 점심내기 가위바위보" maxlength="40" />
      <button class="block mt" id="create">새 게임 만들기</button>
      <div class="err" id="err"></div>
    </div>

    <p class="sub center">데이터베이스 없이 동작하는 초간단 서비스 · 방은 12시간 후 자동 삭제됩니다.</p>
  </div>

  <script>
    const btn = document.getElementById('create');
    const err = document.getElementById('err');
    btn.addEventListener('click', async () => {
      btn.disabled = true; err.textContent = '';
      try {
        const res = await fetch('/api/rooms', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ title: document.getElementById('title').value }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || '생성 실패');
        // 방장 토큰은 URL 해시로 전달 → room 페이지가 localStorage에 저장
        location.href = `/r/${data.roomId}#host=${data.hostToken}`;
      } catch (e) {
        err.textContent = e.message;
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
