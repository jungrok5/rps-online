<body>
  <div class="wrap">
    <h1>✊✋✌️ 가위바위보 서바이벌</h1>
    <p class="sub">방을 만들고 링크를 카톡·팀즈로 공유하세요. 한 명이 남을 때까지 대결합니다!</p>
    <p class="notice">🔒 회원가입·로그인 없음 · <b>어떤 데이터도 저장하지 않습니다.</b> 입력한 내용과 방은 <b>12시간 뒤 자동으로 완전히 사라집니다.</b></p>

    <div class="card">
      <label for="title">게임 제목 (선택)</label>
      <input id="title" type="text" placeholder="예: 점심내기 가위바위보" maxlength="40" />

      <label class="mt">게임 방식</label>
      <div class="modes">
        <button type="button" class="mode selected" data-mode="last-winner">
          🏆 한 명이 이길 때까지
          <span class="desc">진 쪽 탈락, 이긴 사람끼리 올라가 최후의 1인이 우승</span>
        </button>
        <button type="button" class="mode" data-mode="last-loser">
          💀 한 명이 질 때까지
          <span class="desc">이긴 쪽은 안전, 진 사람끼리 남아 마지막 1인이 벌칙 당첨</span>
        </button>
      </div>

      <label class="mt">라운드 제한시간</label>
      <div class="times">
        <button type="button" class="time" data-secs="5">5초</button>
        <button type="button" class="time selected" data-secs="10">10초</button>
        <button type="button" class="time" data-secs="15">15초</button>
        <button type="button" class="time" data-secs="0">무제한</button>
      </div>

      <button class="block mt" id="create">새 게임 만들기</button>
      <div class="err" id="err"></div>
    </div>

    <div class="gamenav">
      <span class="gnav-label">🎮 함께 즐기는 게임</span>
      <div class="gchips">
        <span class="gchip current">✊ 가위바위보</span>
        <a class="gchip" href="https://ladder-online.onrender.com/">🪜 사다리타기</a>
        <a class="gchip" href="https://castinglots-online.onrender.com/">🪧 제비뽑기</a>
      </div>
    </div>

    <div id="adMain" class="adslot"></div>

    <p class="sub center"><a href="/privacy">개인정보처리방침</a></p>
  </div>

  <script>
    const btn = document.getElementById('create');
    const err = document.getElementById('err');
    let mode = 'last-winner';
    let roundSeconds = 10;
    document.querySelectorAll('.mode').forEach((el) => {
      el.addEventListener('click', () => {
        document.querySelectorAll('.mode').forEach((m) => m.classList.remove('selected'));
        el.classList.add('selected');
        mode = el.dataset.mode;
      });
    });
    document.querySelectorAll('.time').forEach((el) => {
      el.addEventListener('click', () => {
        document.querySelectorAll('.time').forEach((t) => t.classList.remove('selected'));
        el.classList.add('selected');
        roundSeconds = Number(el.dataset.secs);
      });
    });
    btn.addEventListener('click', async () => {
      btn.disabled = true; err.textContent = '';
      try {
        const res = await fetch('/api/rooms', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ title: document.getElementById('title').value, mode, roundSeconds }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || '생성 실패');
        // 방장 토큰은 URL 해시로 전달 → room 페이지가 localStorage에 저장
        location.href = `/r/${data.roomId}#host=${data.hostToken}`;
      } catch (e) {
        err.textContent = e.message;
        btn.disabled = false;
      }
    });
  </script>
  <script src="/ads.js"></script>
  <script>window.Ads && Ads.mount(document.getElementById('adMain'), 'main');</script>
</body>
</html>
